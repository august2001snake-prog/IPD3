<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>บุคลากร | งานพยาบาลผู้ป่วยใน</title>

  <link href="https://fonts.googleapis.com/css2?family=Kodchasan&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />

  <style>
    :root {
      --primary: #2EC4B6;
      --secondary: #6C63FF;
      --soft-bg: #F5FAFF;
      --text-dark: #333;
    }

    body {
      font-family: 'Kodchasan', sans-serif;
      background: var(--soft-bg);
      margin: 0;
      color: var(--text-dark);
    }

    a { text-decoration: none; }

    /* Header */
    header {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      padding: 15px 20px;
    }

    .container.nav {
      display: flex;
      justify-content: flex-end;
      align-items: center;
    }

    .menu {
      display: flex;
      gap: 20px;
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .menu a {
      color: #fff;
      font-weight: 500;
      transition: 0.3s;
    }

    .menu a:hover {
      color: #ffdd00;
      border-bottom: 2px solid #ffdd00;
    }

    /* Page title */
    .page-title {
      padding: 30px 20px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: #fff;
      border-radius: 0 0 20px 20px;
    }

    /* Section */
    .section {
      padding: 40px 20px;
      max-width: 1200px;
      margin: auto;
    }

    .center { text-align: center; }

    /* Card */
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 18px;
      text-align: center;
      box-shadow: 0 6px 16px rgba(0,0,0,0.08);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 12px 25px rgba(0,0,0,0.15);
    }

    /* Images */
    .person-photo {
      width: 100%;
      border-radius: 12px;
      margin-bottom: 10px;
    }

    .head-photo {
      width: 220px;
      border-radius: 12px;
      margin-bottom: 15px;
    }

    /* Contact */
    .contact {
      font-size: 14px;
      color: #666;
    }

    .contact .material-icons {
      color: var(--primary);
      vertical-align: middle;
      margin-right: 5px;
    }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
    }

    @media(max-width: 1024px) {
      .grid { grid-template-columns: repeat(3, 1fr); }
    }

    @media(max-width: 768px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media(max-width: 480px) {
      .grid { grid-template-columns: 1fr; }
    }

    /* Button */
    .btn {
      display: inline-block;
      padding: 12px 25px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: #fff;
      border-radius: 8px;
      font-weight: bold;
      margin-top: 20px;
      transition: 0.3s;
      box-shadow: 0 4px 10px rgba(46,196,182,0.3);
    }

    .btn:hover {
      transform: translateY(-2px);
      background: linear-gradient(135deg, #26b3a7, #5a54e6);
    }

    /* Footer */
    footer {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      text-align: center;
      padding: 20px;
      color: #fff;
    }

  </style>
</head>

<body>

<header>
  <div class="container nav">
    <ul class="menu">
      <li><a href="#">เกี่ยวกับหน่วยงาน</a></li>
      <li><a href="#">ข่าวประชาสัมพันธ์</a></li>
      <li><a href="#">ดาวน์โหลด</a></li>
      <li><a href="#">ติดต่อเรา</a></li>
    </ul>
  </div>
</header>

<section class="page-title">
  <h1>บุคลากรงานพยาบาลผู้ป่วยใน หอผู้ป่วยพิเศษ</h1>
</section>

<section class="section center">
  <h2>หัวหน้าหน่วยงาน</h2>
  <div class="card">
    <img class="head-photo" src="../assets/images/2.png">
    <h3>พว.ขวัญหทัย แสวงงาม</h3>
    <p>รักษาการแทนหัวหน้างาน</p>
  </div>
</section>

<section class="section">
  <h2 class="center">ทีมบุคลากร</h2>

  <div class="grid">

    <div class="card">
      <img class="person-photo" src="../assets/images/6.png">
      <h3>พว.ปรารถนา อารมสวะ</h3>
      <p>พยาบาลวิชาชีพ</p>
    </div>

    <div class="card">
      <img class="person-photo" src="../assets/images/12.png">
      <h3>พว.มัญชุภา ไชยวุฒิ</h3>
      <p>พยาบาลวิชาชีพ</p>
    </div>

  </div>
</section>

<section class="section center">
  <a href="#" class="btn">← กลับหน้าแรก</a>
</section>

<footer>
  <p>© 2026 งานพยาบาลผู้ป่วยใน</p>
</footer>

</body>
</html>
