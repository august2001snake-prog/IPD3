<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>งานพยาบาลผู้ป่วยใน</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Prompt", sans-serif;
}

body {
  overflow-x: hidden;
}

/* HEADER */
.header {
  position: fixed;
  width: 100%;
  top: 0;
  background: rgba(0,0,0,0.5);
  z-index: 1000;
}

.nav {
  display: flex;
  justify-content: space-between;
  padding: 15px 40px;
  color: white;
}

.menu {
  display: flex;
  gap: 20px;
  list-style: none;
}

.menu a {
  color: white;
  text-decoration: none;
}

/* HERO */
.hero {
  position: relative;
  height: 100vh;
  overflow: hidden;
}

.slide {
  position: absolute;
  width: 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
  opacity: 0;
  transition: opacity 1s ease-in-out;
}

.slide.active {
  opacity: 1;
}

.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
}

.content {
  position: absolute;
  top: 50%;
  left: 8%;
  transform: translateY(-50%);
  color: white;
  max-width: 500px;
}

.content h1 {
  font-size: 48px;
  margin-bottom: 20px;
}

.content p {
  margin-bottom: 20px;
}

/* BUTTON */
.btn {
  padding: 12px 24px;
  border-radius: 30px;
  margin-right: 10px;
  text-decoration: none;
  font-size: 14px;
}

.btn-primary {
  background: linear-gradient(45deg, #5ec7b7, #f28ca3);
  color: white;
}

.btn-outline {
  border: 1px solid white;
  color: white;
}

/* ARROW */
.arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-size: 30px;
  color: white;
  cursor: pointer;
  padding: 10px;
  background: rgba(0,0,0,0.4);
  border-radius: 50%;
}

.arrow.left { left: 20px; }
.arrow.right { right: 20px; }

</style>
</head>

<body>

<!-- HEADER -->
<header class="header">
  <div class="nav">
    <h1>Nursing Unit</h1>
    <ul class="menu">
      <li><a href="#">เกี่ยวกับ</a></li>
      <li><a href="#">ข่าว</a></li>
      <li><a href="#">ดาวน์โหลด</a></li>
      <li><a href="#">ติดต่อ</a></li>
    </ul>
  </div>
</header>

<!-- HERO -->
<div class="hero">

  <!-- 🔥 ใส่รูปของคุณตรงนี้ -->
  <div class="slide active" style="background-image: url('assets/images/slide1.jpg');"></div>
  <div class="slide" style="background-image: url('assets/images/slide2.jpg');"></div>
  <div class="slide" style="background-image: url('assets/images/slide3.jpg');"></div>

  <div class="overlay"></div>

  <div class="content">
    <h1>บริการที่ชัดเจน<br>ลดขั้นตอน และสบายตา</h1>
    <p>โครงสร้างเว็บไซต์ออกแบบให้ใช้งานง่าย เข้าถึงข้อมูลได้รวดเร็ว</p>
    <a href="#" class="btn btn-primary">ดูข้อมูลสำคัญ</a>
    <a href="#" class="btn btn-outline">เอกสารดาวน์โหลด</a>
  </div>

  <div class="arrow left" onclick="prevSlide()">❮</div>
  <div class="arrow right" onclick="nextSlide()">❯</div>

</div>

<script>
let slides = document.querySelectorAll(".slide");
let index = 0;

function showSlide(i) {
  slides.forEach(s => s.classList.remove("active"));
  slides[i].classList.add("active");
}

function nextSlide() {
  index = (index + 1) % slides.length;
  showSlide(index);
}

function prevSlide() {
  index = (index - 1 + slides.length) % slides.length;
  showSlide(index);
}

/* Auto slide */
setInterval(nextSlide, 4000);
</script>

</body>
</html>
